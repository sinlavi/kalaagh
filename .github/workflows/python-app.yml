name: RSS to Channel Bot

on:
  schedule:
    - cron: '*/5 * * * *' # اجرا هر 5 دقیقه
  workflow_dispatch: # قابلیت اجرای دستی از پنل گیت‌هاب

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # دادن دسترسی به اکشن برای کامیت کردن تغییرات
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_urls.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update processed URLs" && git push)
